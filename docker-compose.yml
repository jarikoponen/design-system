# Dokploy konsumerar detta direkt. Traefik (som Dokploy kör) routar till
# containern via internt Docker-nätverk – därför `expose` istället för `ports`.
# Lokal test: `docker run --rm -p 8080:8080 ui-sundsvall:latest` efter `docker build`.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ui-sundsvall:latest
    container_name: ui-sundsvall
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
